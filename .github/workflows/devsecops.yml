name: AEGIS DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly every Monday at 04:00 UTC to catch newly disclosed CVEs
    - cron: '0 4 * * 1'

jobs:
  security-and-sast:
    name: Secrets & Code SAST (Gitleaks, Bandit, Dependency Audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install SAST & Dependency Audit Tools
        run: |
          pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@c2b186b7ae0ca0fbb35a8233a1e94474ee4cf012 # v2.3.4
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Run Bandit Python SAST
        run: |
          bandit -r backend/ sandbox/backend/ -ll -ii

      - name: Run Dependency Vulnerability Audit (pip-audit)
        run: |
          pip-audit -r backend/requirements.txt -r sandbox/docker/requirements.txt --strict --desc on

      - name: Check SANDBOX_IMAGE Digest Synchronization Across Files
        run: |
          python scripts/check_digest_drift.py
          python scripts/check_sandbox_sync.py

  container-security:
    name: Container Build, Trivy Scanning, SBOM & Cosign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for keyless OIDC Cosign signing
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1
        with:
          cosign-release: 'v2.2.4'

      - name: Build Sandbox Image locally for vulnerability scan
        run: |
          docker build -f sandbox/docker/Dockerfile -t aegis-sandbox:ci .

      - name: Run Trivy Scanner (Non-blocking Full Audit including unfixed CVEs)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          image-ref: 'aegis-sandbox:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Run Trivy Vulnerability Scanner on Sandbox Image (Blocking for Fixed CVEs)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          image-ref: 'aegis-sandbox:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Generate CycloneDX SBOM for Sandbox Image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest \
            image --format cyclonedx --output /tmp/sbom-sandbox.json aegis-sandbox:ci

      - name: Build Backend Image locally for vulnerability scan
        run: |
          docker build -f backend/Dockerfile -t aegis-backend:ci ./backend

      - name: Run Trivy Scanner on Backend Image (Blocking for Fixed CVEs)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          image-ref: 'aegis-backend:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Generate CycloneDX SBOM for Backend Image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest \
            image --format cyclonedx --output /tmp/sbom-backend.json aegis-backend:ci

      - name: Upload CycloneDX SBOM Artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: cyclone-dx-sboms
          path: /tmp/sbom-*.json
          retention-days: 14

      - name: Verify Cosign Installation & Display Keyless OIDC Signing Notice
        run: |
          cosign version
          echo "[+] Cosign v2 is ready for keyless OIDC signing (or local private key) upon registry push."

  model-readiness-gate:
    name: Production Model & Pre-Deploy Readiness Gate
    runs-on: ubuntu-latest
    needs: [security-and-sast, container-security]
    permissions:
      contents: read
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Verify Model & API Gate Readiness (`check_model_ready.py`)
        run: |
          # In CI verification (without live online ML model or running server), verify check_model_ready script executes cleanly with --allow-placeholder
          python scripts/check_model_ready.py --allow-placeholder
          # Note: In production deploy pipeline, run strict gate without --allow-placeholder:
          # python scripts/check_model_ready.py --check-api --api-url https://aegis.prod.internal/api/health


