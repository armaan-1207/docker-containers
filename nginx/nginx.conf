worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # -----------------------------------------
    # Backend Upstream
    # -----------------------------------------
    upstream backend {
        server backend:8000;
        # Future load balancing:
        # server backend2:8000;
        # server backend3:8000;
    }

    server {
        listen 80;
        server_name _;

        # Allow large uploads (e.g. screenshots, files)
        client_max_body_size 50M;

        # -----------------------------------------
        # REST API
        # -----------------------------------------
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # -----------------------------------------
        # FastAPI Swagger UI + ReDoc (dev access)
        # -----------------------------------------
        location /docs {
            proxy_pass http://backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://backend/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # -----------------------------------------
        # WebSocket endpoint
        # -----------------------------------------
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;   # long-lived connection
            proxy_read_timeout 3600s;   # avoid idle-timeout disconnects
            proxy_buffering off;
        }

        # -----------------------------------------
        # Nginx-level health check (no backend needed)
        # Used by: Docker HEALTHCHECK, load balancers
        # -----------------------------------------
        location /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # -----------------------------------------
        # Backend health check (proxied)
        # -----------------------------------------
        location /health {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}