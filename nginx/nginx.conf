worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ─── Security Headers (applied globally) ───────────────────────────────
    # These protect every response the proxy emits, whether from the backend
    # or from nginx itself (e.g., 429 rate-limit pages).
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "DENY"             always;
    # X-XSS-Protection is deprecated in modern browsers, but kept for legacy defense-in-depth
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # ─── Rate Limiting ──────────────────────────────────────────────────────
    # Zones are keyed on client IP, sized 10MB (~160k tracked IPs).
    #   api_zone  — general API traffic (generous)
    #   scan_zone — each request can trigger a Playwright detonation (tight)
    #   auth_zone — credential endpoints (tightest, anti-brute-force)
    limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=20r/s;
    limit_req_zone $binary_remote_addr zone=scan_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;
    limit_req_status 429;
    limit_conn conn_zone 20;

    # ─── Backend Upstream ──────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    # ─── WebSocket connection upgrade map ──────────────────────────────────
    # Ensures non-WebSocket HTTP requests that reach /ws get Connection: close
    # rather than Connection: upgrade, preventing protocol errors in health
    # checkers and other plain-HTTP clients.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── HTTP → HTTPS Redirect ─────────────────────────────────────────────
    # Security finding #4: all traffic was HTTP-only. This block forces
    # every HTTP request to redirect permanently to HTTPS.
    server {
        listen 80;
        server_name _;

        # Allow ACME challenge for Let's Encrypt (production)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else: 301 redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS — Primary Server ────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # ─── TLS Configuration ─────────────────────────────────────────────
        # Development: uses self-signed cert generated by the nginx Dockerfile.
        # Production:  replace paths with Let's Encrypt certs:
        #   ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
        #   ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Strong TLS — TLS 1.2 minimum, TLS 1.3 preferred
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        # Note: ssl_prefer_server_ciphers is intentionally off per Mozilla Modern/Intermediate guidance
        # when all allowed ciphers are strong AEAD suites. This allows clients without hardware AES
        # acceleration (e.g. mobile/ARM) to select ChaCha20-Poly1305 for optimal performance.
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # HSTS — tell browsers to always use HTTPS for this origin
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Default body size limit for general JSON/API requests (anti-DoS protection)
        client_max_body_size 1M;

        # ─── Auth endpoints — tightest limit ───────────────────────────────
        # Checked before the general /api/ block (more specific location wins).
        # burst=5 allows a short legitimate retry burst without tripping.
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth_zone burst=5 nodelay;
            client_max_body_size 256k;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_buffering off;
        }

        # ─── Scan-triggering endpoints — large upload allowed ──────────────
        # Each request can kick off a real Playwright detonation (Stage 2) or
        # a billed threat-intel lookup (quick scan) and may include screenshot payload bytes.
        location ~ ^/api/scans/(quick|stage2) {
            limit_req zone=scan_zone burst=5 nodelay;
            client_max_body_size 20M;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_buffering off;
        }

        # ─── REST API ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=40 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_buffering off;
        }

        # ─── FastAPI docs — only if backend has DEBUG=True ─────────────────
        # In production, backend sets docs_url=None so these 404 cleanly.
        location /docs {
            proxy_pass http://backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://backend/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ─── WebSocket endpoint ────────────────────────────────────────────
        location /ws {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;
            proxy_buffering off;
        }

        # ─── Nginx-level health check (no backend needed) ──────────────────
        location /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ─── Backend health check (proxied) ────────────────────────────────
        location /health {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ─── Root endpoint (proxied) ───────────────────────────────────────
        location = / {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
