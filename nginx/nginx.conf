worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # -----------------------------------------
    # Rate limiting (PATCH: previously a documented TODO in
    # nginx/README.md with nothing implemented -- /api/auth/login is
    # unauthenticated by definition, so it's the most important place
    # to bound request rate).
    #
    # Zones are keyed on client IP, sized 10MB (~160k tracked IPs).
    # - api: generous general-purpose limit for normal API traffic.
    # - auth: much tighter, specifically to slow credential-stuffing /
    #   brute-force attempts against /api/auth/login and /register.
    # -----------------------------------------
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    limit_req_status 429;

    # -----------------------------------------
    # Backend Upstream
    # -----------------------------------------
    upstream backend {
        server backend:8000;
        # Future load balancing:
        # server backend2:8000;
        # server backend3:8000;
    }

    server {
        listen 80;
        server_name _;

        # Allow large uploads (e.g. screenshots, files)
        client_max_body_size 50M;

        # -----------------------------------------
        # Auth endpoints — tightest limit, checked before the general
        # /api/ block below (more specific location wins in nginx).
        # burst=5 allows a short legitimate retry burst (e.g. a user
        # mistyping a password twice) without tripping immediately.
        # -----------------------------------------
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth_zone burst=5 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # -----------------------------------------
        # REST API
        # -----------------------------------------
        location /api/ {
            limit_req zone=api_zone burst=40 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # -----------------------------------------
        # FastAPI Swagger UI + ReDoc (dev access)
        # -----------------------------------------
        location /docs {
            proxy_pass http://backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://backend/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # -----------------------------------------
        # WebSocket endpoint
        # -----------------------------------------
        location /ws {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;   # long-lived connection
            proxy_read_timeout 3600s;   # avoid idle-timeout disconnects
            proxy_buffering off;
        }

        # -----------------------------------------
        # Nginx-level health check (no backend needed)
        # Used by: Docker HEALTHCHECK, load balancers
        # -----------------------------------------
        location /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # -----------------------------------------
        # Backend health check (proxied)
        # -----------------------------------------
        location /health {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
