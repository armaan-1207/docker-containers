global
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client  300s
    timeout server  300s

frontend docker_local
    bind 127.0.0.1:2375
    default_backend docker_remote

backend docker_remote
    server docker_proxy docker_socket_proxy:2375
    http-request set-header Authorization "Basic %[env(PROXY_BASIC_AUTH_B64)]"
