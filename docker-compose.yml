# =======================================================
# AEGIS — Master Docker Compose  (v4 — network pool fix + pinned socket proxy)
# 8 containers + 1 socket proxy + shared volumes
#
# Containers:
#   nginx              — Receptionist (port 80 → 443, terminates TLS)
#   backend            — FastAPI / Uvicorn
#   redis              — Broker + result backend + final verdict cache
#   postgres           — Primary datastore (users, scans, incidents, IOCs)
#   celery_worker      — Task runner (OCR, vision, sandbox, risk_fusion, alerts)
#   celery_beat        — Periodic scheduler (file cleanup, health sweeps)
#   docker_socket_proxy— Scoped Docker API proxy (replaces raw socket mount)
#   sandbox            — Playwright detonation container (isolated network)
#
# Networks:
#   aegis_net        — Internal bridge for core services (nginx/backend/db/redis/beat)
#   docker_proxy_net — Isolated bridge, ONLY aegis_sandbox_runner + docker_socket_proxy.
#   sandbox_net      — Isolated bridge for sandbox only (no route to aegis_net)
#
# =======================================================


# -------------------------------------------------------
# SHARED CONFIGURATION ANCHORS
# -------------------------------------------------------
x-backend-common: &backend-common
  env_file:
    - ./backend/.env
  environment:
    - AEGIS_DB_PASSWORD=${AEGIS_DB_PASSWORD:?AEGIS_DB_PASSWORD must be set in .env}
    - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
  volumes:
    - shared_scans:/shared/scans
  networks:
    - aegis_net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped

# Resource limit anchor reused by all long-running services
x-default-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 1024M
      reservations:
        cpus: "0.25"
        memory: 256M

# -------------------------------------------------------
# SERVICES
# -------------------------------------------------------
services:

  # ---------------------------------------------------
  # 1. NGINX — Receptionist
  # ---------------------------------------------------
  nginx:
    container_name: aegis_nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    networks:
      - aegis_net
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    <<: *default-resources

  # ---------------------------------------------------
  # 2. BACKEND — FastAPI / Uvicorn
  # ---------------------------------------------------
  backend:
    <<: *backend-common
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis_backend
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------
  # 3. REDIS — Broker + Cache
  # ---------------------------------------------------
  redis:
    container_name: aegis_redis
    image: redis:7.2-alpine@sha256:dfa18828cbc07b3ae6a95ec7343f6c214fdee2d836197b4be8e9904420762cd8
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_data:/data
    networks:
      - aegis_net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    <<: *default-resources

  # ---------------------------------------------------
  # 4. POSTGRES — Primary Datastore
  # ---------------------------------------------------
  postgres:
    container_name: aegis_postgres
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:?POSTGRES_ROOT_PASSWORD must be set in .env}
      POSTGRES_DB: postgres
      AEGIS_DB_PASSWORD: ${AEGIS_DB_PASSWORD:?AEGIS_DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/var/backups/postgresql
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/01_init.sh:ro
    networks:
      - aegis_net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Required capability set for official postgres:16-alpine during container boot and initdb
    # (CHOWN/SETUID/SETGID/DAC_OVERRIDE/FOWNER needed by gosu/su-exec before switching from root to postgres user).
    # Accepted risk / future hardening: migrate boot initialization to a dedicated init-container to allow cap_drop: ALL at runtime.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---------------------------------------------------
  # 5. DOCKER SOCKET PROXY — Scoped API gateway
  #    Pinned repo:tag@digest — see change log at the top of this file
  #    (DEVSECOPS_TODO #5) for why the previous line was invalid.
  #    Note on transport: API calls inside docker_proxy_net are unencrypted over internal bridge network.
  # ---------------------------------------------------
  docker_socket_proxy:
    container_name: aegis_socket_proxy
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    environment:
      CONTAINERS: 1
      POST: 1
      # AUTH: 0 — relies on strict network isolation (docker_proxy_net being internal: true with only aegis_sandbox_runner attached).
      # Accepted risk: unauthenticated POST /containers/create is restricted solely to the isolated aegis_sandbox_runner container.
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 0
      INFO: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker_proxy_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ---------------------------------------------------
  # 5b. SANDBOX RUNNER — Purpose-Built Admission Control
  # ---------------------------------------------------
  aegis_sandbox_runner:
    build:
      context: ./backend
      dockerfile: Dockerfile.runner
    container_name: aegis_sandbox_runner
    environment:
      DOCKER_HOST: tcp://docker_socket_proxy:2375
      SANDBOX_NETWORK: aegis_sandbox_net
      SHARED_SCANS_VOLUME: aegis_shared_scans
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-aegis-sandbox:v1.0.0@sha256:45b23deeeec969acba3ef1ba0f7ee7cd8312e75e921ebad966d58dc787943cc9}
      SANDBOX_RUNNER_SECRET: ${SANDBOX_RUNNER_SECRET:-aegis-runner-internal-secret-token}
      MAX_CONCURRENT_DETONATIONS: "10"
    networks:
      - aegis_net          # celery_worker communicates here via RPC
      - docker_proxy_net   # docker_socket_proxy ONLY reachable by this service
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: unless-stopped
    depends_on:
      docker_socket_proxy:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ---------------------------------------------------
  # 6. CELERY WORKER — Task Runner
  # ---------------------------------------------------
  celery_worker:
    <<: *backend-common
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: aegis_celery_worker
    networks:
      - aegis_net          # Postgres, Redis, aegis_sandbox_runner
    entrypoint: ["/app/celery_entrypoint.sh"]
    command: >
      celery -A celery_worker worker
      --loglevel=info
      --concurrency=2
      --queues=default,sandbox,alerts
      --hostname=worker@%h
    environment:
      SANDBOX_RUNNER_URL: http://aegis_sandbox_runner:8002/detonate
      SANDBOX_RUNNER_SECRET: ${SANDBOX_RUNNER_SECRET:-aegis-runner-internal-secret-token}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      SANDBOX_NETWORK: aegis_sandbox_net
      SHARED_SCANS_VOLUME: aegis_shared_scans
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      aegis_sandbox_runner:
        condition: service_started
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_worker inspect ping --timeout 5 2>&1 | grep -c pong || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3072M
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------
  # 7. CELERY BEAT — Periodic Scheduler
  # ---------------------------------------------------
  celery_beat:
    <<: [*backend-common,  *default-resources]
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: aegis_celery_beat
    entrypoint: ["/app/celery_entrypoint.sh"]
    command: >
      celery -A celery_beat beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --schedule /app/celerybeat-schedule/celerybeat-schedule
    volumes:
      - shared_scans:/shared/scans
      - celery_beat_data:/app/celerybeat-schedule
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/celerybeat-schedule/celerybeat-schedule || test -f /tmp/.celery-beat-alive"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------
  # 8. CLAMAV — Anti-Malware Sidecar Daemon
  # ---------------------------------------------------
  clamav:
    container_name: aegis_clamav
    image: clamav/clamav:stable@sha256:83130a3b60654a4f226feffea549792cfcf28ea6b9de1dee210c8064cd114006
    environment:
      - CLAMAV_NO_FRESHCLAM=false
    volumes:
      - clamav_db:/var/lib/clamav
    networks:
      - aegis_net
    expose:
      - "3310"
    healthcheck:
      test: ["CMD-SHELL", "echo zPING | nc localhost 3310 | grep -q PONG || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          cpus: "0.25"
          memory: 512M

  # ---------------------------------------------------
  # 9. SANDBOX — Playwright Detonation Container
  # ---------------------------------------------------
  sandbox:
    container_name: aegis_sandbox
    build:
      context: ./sandbox
      dockerfile: docker/Dockerfile
    image: ${SANDBOX_IMAGE:-aegis-sandbox:v1.0.0@sha256:45b23deeeec969acba3ef1ba0f7ee7cd8312e75e921ebad966d58dc787943cc9}
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - shared_scans:/app/output
    networks:
      - sandbox_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /home/sandbox/.config:rw,noexec,nosuid,size=32m
      - /home/sandbox/.pki:rw,noexec,nosuid,size=16m
      - /home/sandbox/.local:rw,noexec,nosuid,size=32m
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2048M
          pids: 512
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles:
      - sandbox

# -------------------------------------------------------
# VOLUMES
# -------------------------------------------------------
volumes:
  shared_scans:
    driver: local
    name: aegis_shared_scans
  postgres_data:
    driver: local
    name: aegis_postgres_data
  postgres_backups:
    driver: local
    name: aegis_postgres_backups
  celery_beat_data:
    driver: local
    name: aegis_celery_beat_data
  clamav_db:
    driver: local
    name: aegis_clamav_db
  redis_data:
    driver: local
    name: aegis_redis_data

# -------------------------------------------------------
# NETWORKS
# -------------------------------------------------------
networks:
  aegis_net:
    driver: bridge
    name: aegis_net

  docker_proxy_net:
    driver: bridge
    internal: true
    name: aegis_docker_proxy_net

  sandbox_net:
    driver: bridge
    internal: false   # internet egress allowed for URL detonation
    name: aegis_sandbox_net