# =======================================================
# AEGIS — Master Docker Compose  (v4 — network pool fix + pinned socket proxy)
# 8 containers + 1 socket proxy + shared volumes
#
# Containers:
#   nginx              — Receptionist (port 80 → 443, terminates TLS)
#   backend            — FastAPI / Uvicorn
#   redis              — Broker + result backend + final verdict cache
#   postgres           — Primary datastore (users, scans, incidents, IOCs)
#   celery_worker      — Task runner (OCR, vision, sandbox, risk_fusion, alerts)
#   celery_beat        — Periodic scheduler (file cleanup, health sweeps)
#   docker_socket_proxy— Scoped Docker API proxy (replaces raw socket mount)
#   sandbox            — Playwright detonation container (isolated network)
#
# Networks:
#   aegis_net        — Internal bridge for core services (nginx/backend/db/redis/beat)
#   docker_proxy_net — Isolated bridge, ONLY celery_worker + docker_socket_proxy.
#   sandbox_net      — Isolated bridge for sandbox only (no route to aegis_net)
#
# =======================================================


# -------------------------------------------------------
# SHARED CONFIGURATION ANCHORS
# -------------------------------------------------------
x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - ./backend/.env
  environment:
    - AEGIS_DB_PASSWORD=${AEGIS_DB_PASSWORD:?AEGIS_DB_PASSWORD must be set in .env}
    - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
  volumes:
    - shared_scans:/shared/scans
  networks:
    - aegis_net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

# Resource limit anchor reused by all long-running services
x-default-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 1024M
      reservations:
        cpus: "0.25"
        memory: 256M

# -------------------------------------------------------
# SERVICES
# -------------------------------------------------------
services:

  # ---------------------------------------------------
  # 1. NGINX — Receptionist
  # ---------------------------------------------------
  nginx:
    container_name: aegis_nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    networks:
      - aegis_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    <<: *default-resources

  # ---------------------------------------------------
  # 2. BACKEND — FastAPI / Uvicorn
  # ---------------------------------------------------
  backend:
    <<: *backend-common
    container_name: aegis_backend
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------
  # 3. REDIS — Broker + Cache
  # ---------------------------------------------------
  redis:
    container_name: aegis_redis
    image: redis:7.2-alpine
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    networks:
      - aegis_net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *default-resources

  # ---------------------------------------------------
  # 4. POSTGRES — Primary Datastore
  # ---------------------------------------------------
  postgres:
    container_name: aegis_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:?POSTGRES_ROOT_PASSWORD must be set in .env}
      POSTGRES_DB: postgres
      AEGIS_DB_PASSWORD: ${AEGIS_DB_PASSWORD:?AEGIS_DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/01_init.sh:ro
    networks:
      - aegis_net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---------------------------------------------------
  # 5. DOCKER SOCKET PROXY — Scoped API gateway
  #    Pinned repo:tag@digest — see change log at the top of this file
  #    (DEVSECOPS_TODO #5) for why the previous line was invalid.
  # ---------------------------------------------------
  docker_socket_proxy:
    container_name: aegis_socket_proxy
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    environment:
      CONTAINERS: 1
      POST: 1
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 0
      INFO: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker_proxy_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ---------------------------------------------------
  # 6. CELERY WORKER — Task Runner
  # ---------------------------------------------------
  celery_worker:
    <<: *backend-common
    container_name: aegis_celery_worker
    networks:
      - aegis_net          # Postgres, Redis
      - docker_proxy_net   # docker_socket_proxy only reachable here
    entrypoint: ["/app/celery_entrypoint.sh"]
    command: >
      celery -A celery_worker worker
      --loglevel=info
      --concurrency=2
      --queues=default,sandbox,alerts
      --hostname=worker@%h
    environment:
      DOCKER_HOST: tcp://docker_socket_proxy:2375
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker_socket_proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_worker inspect ping --timeout 5 2>&1 | grep -c pong || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3072M
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------
  # 7. CELERY BEAT — Periodic Scheduler
  # ---------------------------------------------------
  celery_beat:
    <<: [*backend-common,  *default-resources]
    container_name: aegis_celery_beat
    entrypoint: ["/app/celery_entrypoint.sh"]
    command: >
      celery -A celery_beat beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --schedule /app/celerybeat-schedule/celerybeat-schedule
    volumes:
      - shared_scans:/shared/scans
      - celery_beat_data:/app/celerybeat-schedule
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/celerybeat-schedule/celerybeat-schedule || test -f /tmp/.celery-beat-alive"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------
  # 8. SANDBOX — Playwright Detonation Container
  # ---------------------------------------------------
  sandbox:
    container_name: aegis_sandbox
    build:
      context: ./sandbox
      dockerfile: docker/Dockerfile
    image: aegis-sandbox:latest
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - shared_scans:/app/output
    networks:
      - sandbox_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles:
      - sandbox

# -------------------------------------------------------
# VOLUMES
# -------------------------------------------------------
volumes:
  shared_scans:
    driver: local
  postgres_data:
    driver: local
  celery_beat_data:
    driver: local

# -------------------------------------------------------
# NETWORKS
# -------------------------------------------------------
# DEVSECOPS_TODO #4 fix: no `ipam.config.subnet` on any of these three.
# None of them need a predictable, fixed address block — every reference
# to another container in this file (and in code, e.g.
# tasks/sandbox_analysis.py's SANDBOX_NETWORK) is by container/service
# NAME via Docker's embedded DNS, never by literal IP. Letting Docker
# auto-allocate from its free pool list is what actually fixes "pool
# overlaps with other one on this address space" — pinning a *different*
# hardcoded subnet just moves the collision to wherever the next thing
# on this host happens to claim next.
networks:
  aegis_net:
    driver: bridge

  docker_proxy_net:
    driver: bridge
    internal: true

  sandbox_net:
    driver: bridge
    internal: false   # internet egress allowed for URL detonation