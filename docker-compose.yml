# =======================================================
# AEGIS — Master Docker Compose  (v3 — DevSecOps follow-up hardening)
# 8 containers + 1 socket proxy + shared volumes
#
# Containers:
#   nginx              — Receptionist (port 80 → 443, terminates TLS)
#   backend            — FastAPI / Uvicorn
#   redis              — Broker + result backend + final verdict cache
#   postgres           — Primary datastore (users, scans, incidents, IOCs)
#   celery_worker      — Task runner (OCR, vision, sandbox, risk_fusion, alerts)
#   celery_beat        — Periodic scheduler (file cleanup, health sweeps)
#   docker_socket_proxy— Scoped Docker API proxy (replaces raw socket mount)
#   sandbox            — Playwright detonation container (isolated network)
#
# Networks:
#   aegis_net        — Internal bridge for core services (nginx/backend/db/redis/beat)
#   docker_proxy_net — NEW: isolated bridge, ONLY celery_worker + docker_socket_proxy.
#                      See "DevSecOps follow-up" note below.
#   sandbox_net      — Isolated bridge for sandbox only (no route to aegis_net)
#
# Shared Volumes:
#   shared_scans  — Backend writes screenshots; Sandbox writes results
#   postgres_data — Persistent PostgreSQL data
#   celery_beat_data — Celery Beat schedule persistence
#
# Usage:
#   docker compose up -d          # start all persistent services
#   docker compose logs -f        # follow all logs
#   docker compose down           # stop and remove containers
#   docker compose down -v        # also wipe volumes (DESTRUCTIVE)
# =======================================================


# -------------------------------------------------------
# SHARED CONFIGURATION ANCHORS
# -------------------------------------------------------
x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - ./backend/.env
  volumes:
    - shared_scans:/shared/scans
  networks:
    - aegis_net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

# Resource limit anchor reused by all long-running services
x-default-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 1024M
      reservations:
        cpus: "0.25"
        memory: 256M

# -------------------------------------------------------
# SERVICES
# -------------------------------------------------------
services:

  # ---------------------------------------------------
  # 1. NGINX — Receptionist
  #    HTTP (80) → redirects to HTTPS
  #    HTTPS (443) → proxies to backend:8000
  #    Handles REST (/api/) and WebSocket (/ws) upgrades
  #    Rate-limits auth, scan, and general API endpoints.
  # ---------------------------------------------------
  nginx:
    container_name: aegis_nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    networks:
      - aegis_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    <<: *default-resources

  # ---------------------------------------------------
  # 2. BACKEND — FastAPI / Uvicorn
  #    Unicorn receives from Nginx → FastAPI routes
  #    auth.py decodes JWT → finds user in Postgres
  #    calls Pydantic schemas → queues Celery tasks
  #
  #    NOTE: backend is NOT on docker_proxy_net — it never talks to
  #    Docker directly, only celery_worker does (via Celery task queue).
  # ---------------------------------------------------
  backend:
    <<: *backend-common
    container_name: aegis_backend
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------
  # 3. REDIS — Broker + Cache
  #    Celery broker/result-backend
  #    Also used for URL scan result caching (1h TTL)
  #    Also used for Redis Pub/Sub for WebSocket push
  #    Password-protected; no persistence (pure cache/broker)
  # ---------------------------------------------------
  redis:
    container_name: aegis_redis
    image: redis:7.2-alpine
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    networks:
      - aegis_net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *default-resources

  # ---------------------------------------------------
  # 4. POSTGRES — Primary Datastore
  #    Tables: users, scans, incidents, iocs, statistics
  #    Init script creates aegis_db + extensions
  # ---------------------------------------------------
  postgres:
    container_name: aegis_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:?POSTGRES_ROOT_PASSWORD must be set in .env}
      POSTGRES_DB: postgres
      AEGIS_DB_PASSWORD: ${AEGIS_DB_PASSWORD:?AEGIS_DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/01_init.sh:ro
    networks:
      - aegis_net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---------------------------------------------------
  # 5. DOCKER SOCKET PROXY — Scoped API gateway
  #    Replaces the raw /var/run/docker.sock mount that
  #    previously gave the Celery worker full host access
  #    (Critical finding #3 from security review).
  #
  #    Only exposes the minimum API surface:
  #      CONTAINERS=1   → list/inspect containers
  #      POST=1         → create + start containers
  #    All other endpoints (exec, images, volumes, info,
  #    swarm, etc.) are blocked at the proxy level.
  #
  docker_socket_proxy:
    container_name: aegis_socket_proxy
    image: tecnativa/docker-socket-proxy:@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    environment:
      # Minimum permissions: create + start sandbox containers only
      CONTAINERS: 1
      POST: 1
      # Explicitly deny everything else
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 0
      INFO: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker_proxy_net   # CHANGED: was aegis_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ---------------------------------------------------
  # 6. CELERY WORKER — Task Runner
  #    Executes pipeline tasks in order:
  #      browser_features → sandbox_analysis →
  #      consistency → risk_fusion → alert_pipeline
  #    Uses Docker SOCKET PROXY (not raw socket) to
  #    spawn sandbox containers safely.
  #
  #    DevSecOps follow-up fix: now dual-homed on BOTH aegis_net
  #    (Postgres, Redis) AND docker_proxy_net (the socket proxy).
  #    It's the only service besides the proxy itself on
  #    docker_proxy_net. The explicit `networks:` list below
  #    overrides the single-network list inherited from
  #    x-backend-common (YAML merge keys let explicit sibling keys
  #    win over merged ones from the anchor).
  # ---------------------------------------------------
  celery_worker:
    <<: *backend-common
    container_name: aegis_celery_worker
    networks:
      - aegis_net          # Postgres, Redis
      - docker_proxy_net   # NEW: docker_socket_proxy only reachable here
    entrypoint: ["/app/celery_entrypoint.sh"]
    command: >
      celery -A celery_worker worker
      --loglevel=info
      --concurrency=2
      --queues=default,sandbox,alerts
      --hostname=worker@%h
    environment:
      # Point Docker client at the socket proxy, not the raw socket.
      # Resolves via docker_proxy_net now, not aegis_net.
      DOCKER_HOST: tcp://docker_socket_proxy:2375
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker_socket_proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_worker inspect ping --timeout 5 2>&1 | grep -c pong || exit 1"]
      interval: 45s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3072M
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------
  # 7. CELERY BEAT — Periodic Scheduler
  #    Fires scheduled maintenance tasks:
  #      file_cleanup: hourly purge of scan artifacts
  #      older than ARTIFACT_RETENTION_DAYS (default 14d)
  #
  #    NOTE: celery_beat only ever enqueues task *names* onto Redis —
  #    it never talks to Docker directly, so it stays aegis_net-only
  #    (inherited from x-backend-common) and does NOT get docker_proxy_net.
  # ---------------------------------------------------
  celery_beat:
    <<: [*backend-common,  *default-resources]
    container_name: aegis_celery_beat
    entrypoint: ["/app/celery_entrypoint.sh"]
    command: >
      celery -A celery_beat beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --schedule /app/celerybeat-schedule/celerybeat-schedule
    volumes:
      - shared_scans:/shared/scans
      - celery_beat_data:/app/celerybeat-schedule
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/celerybeat-schedule/celerybeat-schedule || test -f /tmp/.celery-beat-alive"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------
  # 8. SANDBOX — Playwright Detonation Container
  #    Isolated: runs on sandbox_net only.
  #    Has internet egress + shared_scans volume.
  #    NO route to aegis_net → cannot reach Postgres or
  #    Redis even if Chromium is exploited (finding #9).
  #
  #    Invoked per-job by celery_worker via docker run
  #    (through the socket proxy). Not a persistent service.
  # ---------------------------------------------------
  sandbox:
    container_name: aegis_sandbox
    build:
      context: ./sandbox
      dockerfile: docker/Dockerfile
    image: aegis-sandbox:latest
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - shared_scans:/app/output
    networks:
      - sandbox_net
    # Security hardening — capability-dropped, no privilege escalation
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          cpus: "0.25"
          memory: 512M
    # Sandbox is run-per-job; it exits after each scan.
    # Use: docker compose run --rm sandbox <URL> --output-dir /app/output
    profiles:
      - sandbox

# -------------------------------------------------------
# VOLUMES
# -------------------------------------------------------
volumes:
  # Shared scan artefacts — the central shared bus:
  #   backend       → writes screenshots (Stage 1)
  #   celery_worker → queues and monitors jobs
  #   sandbox       → writes scan_<id>.json + .png results
  shared_scans:
    driver: local

  # PostgreSQL persistent data
  postgres_data:
    driver: local

  # Celery Beat schedule persistence (survives container restart)
  celery_beat_data:
    driver: local

# -------------------------------------------------------
# NETWORKS
# -------------------------------------------------------
networks:
  # Internal backbone — core services communicate here
  aegis_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

  # NEW (DevSecOps follow-up): isolated network for the Docker socket
  # proxy. Only celery_worker and docker_socket_proxy attach to this —
  # nginx, backend, postgres, and redis have no route to the proxy's
  # CONTAINERS+POST API at all. `internal: true` also means this
  # network itself has no external gateway/internet egress.
  docker_proxy_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24

  # Sandbox isolation — sandbox_net has internet egress
  # but ZERO routing path to aegis_net (no shared subnet,
  # no container in both networks). Compromising Chromium
  # inside the sandbox cannot reach Postgres or Redis.
  sandbox_net:
    driver: bridge
    internal: false   # internet egress allowed for URL detonation
    ipam:
      config:
        - subnet: 172.21.0.0/24